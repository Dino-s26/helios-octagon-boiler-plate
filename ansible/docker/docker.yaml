---
- name: Install Docker Ubuntu Server
  hosts: '{{ host_target }}'
  gather_facts: false
  # become: true ## override on ansible.cfg

  tasks:
  - name: Check connectivity to Servers / Endpoints
    ansible.builtin.ping:

  - name: Update OS Dependencies Before install Docker
    ansible.builtin.apt:
      update_cache: true
      upgrade: yes

  - name: Remove Conflicted deprecated Docker Package
    ansible.builtin.apt:
      name: 
      - docker.io 
      - docker-compose 
      - docker-compose-v2 
      - docker-doc 
      - podman-docker 
      - containerd 
      - runc
      state: absent
      purge: yes
    
  - name: Instal ca-certificates & curl
    ansible.builtin.apt:
      name:
      - ca-certificates 
      - curl 
      state: present

  - name: Ensure keyrings directory exists
    ansible.builtin.file:
      path: /etc/apt/keyrings
      state: directory
      mode: '0755'

  - name: Download Docker GPG key
    ansible.builtin.get_url:
      url: https://download.docker.com/linux/ubuntu/gpg
      dest: /etc/apt/keyrings/docker.asc
      mode: '0644'

  - name: chmod the /etc/apt/keyrings/docker.asc
    ansible.builtin.file:
      path: /etc/apt/keyrings/docker.asc
      mode: a+r
      state: file
  
  - name: Get Ubuntu codename
    ansible.builtin.command: lsb_release -cs
    register: os_version
    changed_when: false

  - name: Add Docker APT source file
    ansible.builtin.copy:
      dest: /etc/apt/sources.list.d/docker.sources
      content: |
        Types: deb
        URIs: https://download.docker.com/linux/ubuntu
        Suites: {{ os_version.stdout }}
        Components: stable
        Signed-By: /etc/apt/keyrings/docker.asc
      owner: root
      group: root
      mode: '0644'
  
  - name: Get Update for new APT Sources
    ansible.builtin.apt:
      update_cache: true
      upgrade: yes

  - name: Install Docker Dependencies
    ansible.builtin.apt:
      name:
      - docker-ce 
      - docker-ce-cli 
      - containerd.io 
      - docker-buildx-plugin 
      - docker-compose-plugin
      state: present

  - name: Run Docker Services
    ansible.builtin.systemd:
      name: docker
      state: started
      enabled: true
      daemon_reload: true
    register: docker_status

  - name: Check Docker Status
    ansible.builtin.debug:
        var: docker_status.status.ActiveState

  - name: Add user to Docker group
    ansible.builtin.user:
      name: ubuntu
      groups: docker
      append: yes

